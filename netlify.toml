# AccessPTT — Netlify deploy
# Pure static site, no build step. Messaging uses Firebase (free tier)
# directly from the browser, so no serverless backend is needed.

[build]
  publish = "."
  command = ""

# Camera/mic access (getUserMedia) requires HTTPS — Netlify serves HTTPS by default.
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "no-referrer"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "microphone=(self), camera=(self)"
